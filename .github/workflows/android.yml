name: Build Android TV Player APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Purge Broken Cache and Force Recreate
      run: |
        rm -f app/src/main/AndroidManifest.xml
        rm -f app/src/main/res/drawable/ic_launcher_foreground.xml
        rm -f app/src/main/res/mipmap/ic_launcher_foreground.xml
        mkdir -p app/src/main/res/drawable
        
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://github.com">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <application android:allowBackup="true" android:supportsRtl="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://github.com"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path android:fillColor="#FFFFFF" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF

    - name: Generate Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-build-cache

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Pleer-TV-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
