name: Build Android TV Player APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Умный поиск папки с Android-проектом и генерация gradlew
    - name: Locate Project and Generate Gradle Wrapper
      run: |
        # Ищем, в какой папке лежит settings.gradle
        TARGET_DIR=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
        
        if [ -z "$TARGET_DIR" ] || [ "$TARGET_DIR" = "." ]; then
          echo "Проект находится в корневой директории."
          TARGET_DIR="."
        else
          echo "Проект найден в подпапке: $TARGET_DIR"
        fi
        
        # Сохраняем путь для следующих шагов
        echo "PROJECT_ROOT=$TARGET_DIR" >> $GITHUB_ENV
        
        # Заходим туда и генерируем gradlew
        cd "$TARGET_DIR"
        if [ ! -f "gradlew" ]; then
          echo "Файл gradlew не найден, генерируем новый..."
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd ${{ env.PROJECT_ROOT }}
        ./gradlew assembleDebug

    - name: Find and Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Pleer-TV-Debug-APK
        path: "**/build/outputs/apk/debug/*-debug.apk" # Ищет APK в любой подпапке сборки
