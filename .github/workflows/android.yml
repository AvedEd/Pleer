name: Build Android TV Player APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    # Восстанавливаем чистый манифест из Base64
    - name: Create Valid AndroidManifest
      run: |
        mkdir -p app/src/main
        echo "" | base64 -d > app/src/main/AndroidManifest.xml

    # Генерируем недостающий ресурс иконки, чтобы линкер ресурсов не падал
    - name: Generate Missing Icon Resources
      run: |
        mkdir -p app/src/main/res/mipmap
        cat << 'EOF' > app/src/main/res/mipmap/ic_launcher_foreground.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://github.com"
            android:width="108dp"
            android:height="108dp"
            android:viewportWidth="108"
            android:viewportHeight="108">
            <path
                android:fillColor="#FFFFFF"
                android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF

    - name: Generate Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Pleer-TV-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
