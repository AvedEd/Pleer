name: Build Android TV Player APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2' 

    # Пишем манифест через экранированные коды двоеточий, чтобы обойти баг парсера
    - name: Overwrite AndroidManifest safely via hex
      run: |
        mkdir -p app/src/main
        printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns\x3aandroid="http://android.com">\n    <uses-permission android\x3aname="android.permission.INTERNET" />\n    <uses-permission android\x3aname="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-feature android\x3aname="android.hardware.touchscreen" android\x3arequired="false" />\n    <uses-feature android\x3aname="android.software.leanback" android\x3arequired="true" />\n    <application\n        android\x3aallowBackup="true"\n        android\x3aicon="@mipmap/ic_launcher"\n        android\x3alabel="Pleer"\n        android\x3asupportsRtl="true"\n        android\x3abanner="@mipmap/ic_launcher">\n        <activity\n            android\x3aname=".MainActivity"\n            android\x3aexported="true">\n            <intent-filter>\n                <action android\x3aname="android.intent.action.MAIN" />\n                <category android\x3aname="android.intent.category.LAUNCHER" />\n                <category android\x3aname="android.intent.category.LEANBACK_LAUNCHER" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n' > app/src/main/AndroidManifest.xml

    - name: Generate Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Pleer-TV-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
