name: Build Android TV Player APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    # Самый надежный способ записи манифеста без искажения двоеточий
    - name: Create Valid AndroidManifest
      run: |
        mkdir -p app/src/main
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > app/src/main/AndroidManifest.xml
        echo "<manifest xmlns:android=\"http://android.com\">" >> app/src/main/AndroidManifest.xml
        echo "    <uses-permission android:name=\"android.permission.INTERNET\" />" >> app/src/main/AndroidManifest.xml
        echo "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\" />" >> app/src/main/AndroidManifest.xml
        echo "    <application android:allowBackup=\"true\" android:supportsRtl=\"true\">" >> app/src/main/AndroidManifest.xml
        echo "        <activity android:name=\".MainActivity\" android:exported=\"true\">" >> app/src/main/AndroidManifest.xml
        echo "            <intent-filter>" >> app/src/main/AndroidManifest.xml
        echo "                <action android:name=\"android.intent.action.MAIN\" />" >> app/src/main/AndroidManifest.xml
        echo "                <category android:name=\"android.intent.category.LAUNCHER\" />" >> app/src/main/AndroidManifest.xml
        echo "            </intent-filter>" >> app/src/main/休息vity>" >> app/src/main/AndroidManifest.xml
        echo "        </activity>" >> app/src/main/AndroidManifest.xml
        echo "    </application>" >> app/src/main/AndroidManifest.xml
        echo "</manifest>" >> app/src/main/AndroidManifest.xml

    # Исправляем опечатку в генерации иконки
    - name: Generate Missing Icon Resources
      run: |
        mkdir -p app/src/main/res/mipmap
        echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "<vector xmlns:android=\"http://android.com\"" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "    android:width=\"108dp\"" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "    android:height=\"108dp\"" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "    android:viewportWidth=\"108\"" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "    android:viewportHeight=\"108\">" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "    <path" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "        android:fillColor=\"#FFFFFF\"" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "        android:pathData=\"M0,0h108v108h-108z\"/>" >> app/src/main/res/mipmap/ic_launcher_foreground.xml
        echo "</vector>" >> app/src/main/res/mipmap/ic_launcher_foreground.xml

    - name: Generate Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Pleer-TV-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
