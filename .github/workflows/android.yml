name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Этот шаг кэширует зависимости Gradle, чтобы сборка была быстрее
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ГЛАВНОЕ: запускаем gradle напрямую, а не через ./gradlew
      # --no-daemon обязателен в CI, иначе сборка может зависнуть
      - name: Build with Gradle
        run: gradle assembleDebug --no-build-cache --no-daemon

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
