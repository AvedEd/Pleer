name: Build Android TV Player APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2' 

    # Создаем манифест через экранированный блок, заменяя опасный префикс на "a"
    - name: Ultimate Safe Manifest Generation
      run: |
        mkdir -p app/src/main
        cat << 'MANIFEST_EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:a="http://android.com">
            <uses-permission a:name="android.permission.INTERNET" />
            <uses-permission a:name="android.permission.ACCESS_NETWORK_STATE" />
            <application a:allowBackup="true" a:supportsRtl="true">
                <activity a:name=".MainActivity" a:exported="true">
                    <intent-filter>
                        <action a:name="android.intent.action.MAIN" />
                        <category a:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFEST_EOF

    - name: Generate Wrapper
      run: gradle wrapper

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Pleer-TV-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
